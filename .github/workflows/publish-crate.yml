name: Publish Crate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      crate_version: ${{ steps.version_check.outputs.crate_version }}
      tag_version: ${{ steps.version_check.outputs.tag_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Validate tag version
        id: version_check
        run: |
          crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [ -z "$crate_version" ]; then
            echo "Unable to read Cargo.toml package version" >&2
            exit 1
          fi
          echo "crate_version=$crate_version" >> "$GITHUB_OUTPUT"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            case "${GITHUB_REF_NAME}" in
              v*)
                tag_version="${GITHUB_REF_NAME#v}"
                ;;
              *)
                echo "Release tags must use the form v<semver>" >&2
                exit 1
                ;;
            esac

            echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"

            if [ "$tag_version" != "$crate_version" ]; then
              echo "Tag version v$tag_version does not match Cargo.toml version $crate_version" >&2
              exit 1
            fi
          else
            echo "tag_version=" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch runs preflight only; no publish will occur"
          fi
      - name: Preflight
        run: |
          cargo check
          cargo test
          cargo publish --dry-run
  publish:
    needs: preflight
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
